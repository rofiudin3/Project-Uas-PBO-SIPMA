# =============================================
#  SIPMA - Spring Boot Backend Configuration
# =============================================

# Server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:sipmadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - izinkan akses dari frontend React
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Mail (simulasi/dev mode - gunakan MailHog atau akun SMTP nyata)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Nonaktifkan Spring Security default form-based login
spring.security.user.name=admin
spring.security.user.password=admin123
